# guuey scaffolder clean-room — verifies `@guuey/create-agentic-app` scaffolds
# a working app when installed from a registry, exactly as an external
# npm/npx consumer gets it. Port of ggui's proven
# `oss/e2e/clean-room-consumer` compose pattern
# (`/workspaces/ggui/oss/e2e/clean-room-consumer/docker-compose.yml`).
#
# Run it with:
#
#   make test-scaffold-clean-room
#
# Two services:
#   verdaccio    — throwaway local npm registry (storage in the image's own
#                  anonymous volume, dropped by `docker compose down -v`)
#   gate-runner  — installs + builds the internal cohort, publishes it to
#                  Verdaccio, then npx-scaffolds both frameworks and
#                  installs/typechecks/builds each from the registry — the
#                  same real npx-resolution path a real user hits
#                  (see scripts/run-gate.mjs)
name: guuey-scaffold-clean-room

services:
  verdaccio:
    image: verdaccio/verdaccio:5
    volumes:
      - ./verdaccio/config.yaml:/verdaccio/conf/config.yaml:ro
    healthcheck:
      # node, not wget — the verdaccio image always ships node (it IS a node
      # app); its `wget` does not reliably handle `--spider` on `/-/ping`,
      # which silently flapped the container to `unhealthy` in ggui's own
      # clean-room-consumer harness. Copied verbatim.
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://localhost:4873/-/ping',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 2s
      timeout: 3s
      retries: 40
      start_period: 5s

  gate-runner:
    build:
      # Context is the REPO ROOT, not the oss/ workspace root: the internal
      # cohort spans both `oss/packages/*` AND the top-level
      # `silverprotocol/` submodule, and pnpm-workspace.yaml's single
      # lockfile covers the WHOLE monorepo (apps/, backend/, private/,
      # mcp-servers/, e2e/, …) — every workspace member's package.json must
      # be present for `pnpm install --frozen-lockfile` to resolve, even
      # though only the cohort's dist/ ends up published. See
      # `Dockerfile.dockerignore` (next to the Dockerfile) for exactly what
      # is excluded from that context.
      context: ../../../../
      dockerfile: oss/packages/create-agentic-app/e2e/Dockerfile
    depends_on:
      verdaccio:
        condition: service_healthy
    environment:
      VERDACCIO_URL: http://verdaccio:4873
      # Pass-through only, unset by default. Optional hook for the Task 2
      # real-LLM local turn — Task 1's clean-room gate is fully keyless.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      # Gate logic is bind-mounted (not baked) so it iterates without an
      # image rebuild — none of this is the scaffolded apps' node_modules,
      # which are created fresh inside the container from Verdaccio.
      - ./scripts:/gate/scripts:ro

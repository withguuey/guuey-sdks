# Throwaway local npm registry for the scaffolder clean-room gate.
#
# `@guuey/*` is served locally (published fresh by run-gate.mjs on every
# run); every other dependency — INCLUDING `@silverprotocol/*`, live on
# public npm since the 2026-07-06 submodule→npm pivot — is proxied from
# npmjs through the `npmjs` uplink so the scaffolded apps' installs resolve
# their full tree without touching the public registry directly.
#
# Storage lives in the verdaccio image's own anonymous volume (the
# verdaccio/verdaccio image declares `VOLUME /verdaccio/storage`) —
# `make test-scaffold-clean-room` runs `docker compose down -v`, which drops
# it between runs, so publishing the same version twice never collides.
storage: /verdaccio/storage

# Verdaccio's default (10mb) is too small for some packages; real npmjs
# accepts these fine, so raise the cap here rather than have the gate flag a
# non-issue.
max_body_size: 200mb

uplinks:
  npmjs:
    url: https://registry.npmjs.org/
    cache: true

packages:
  "@guuey/*":
    # Local-only: never proxy @guuey/* to npmjs. The whole point of the gate
    # is to exercise the freshly-published local copies, not whatever (if
    # anything) is live on the real registry.
    access: $all
    publish: $all
    unpublish: $all
  # @silverprotocol/* intentionally has NO local-only rule anymore: the SDKs
  # are published to public npm (0.1.0, 2026-07-06) and consumers pin them
  # like any other upstream dep, so the scope falls through to the `**`
  # npmjs proxy below. The old local-only rule 404'd every scaffold install
  # once the gate's cohort stopped publishing the (deleted) submodule.
  "**":
    access: $all
    publish: $all
    proxy: npmjs

server:
  keepAliveTimeout: 60

listen: 0.0.0.0:4873

log:
  type: stdout
  format: pretty
  level: warn

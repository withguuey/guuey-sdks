packages:
  - "packages/*"

# pnpm 11 blocks dependency install scripts by default and hard-errors the
# install while unapproved ones exist. The key it actually reads is
# `allowBuilds` (per-package boolean; `onlyBuiltDependencies` is silently
# ignored in both package.json and this file — verified empirically in the
# silverprotocol SDK, same pnpm). Every flagged package is listed with
# `false`: none need their scripts here (esbuild ships prebuilt platform
# binaries as optionalDependencies; the rest are native/CLI extras unused
# by the build, tests, and scaffold smoke — all verified green on a cold
# clone with every entry false).
# @google/adk (host devDep/peer) declares five NON-optional @mikro-orm/*
# driver peers; auto-installing them drags in sqlite3's native build. None
# are needed (InMemoryRunner only) — same posture as the scaffolded
# templates and the guuey monorepo root.
autoInstallPeers: false

# pnpm resolves the NEAREST workspace file, so any script executed inside
# oss/packages/* binds to THIS workspace — not the monorepo root, whose
# pnpm-workspace.yaml already sets `verifyDepsBeforeRun: false`. Without
# the same setting here, pnpm 11's pre-run deps check fires when the
# monorepo's turbo graph runs an oss package's build (Amplify does
# filtered installs, so the check always reads "outdated") and auto-runs
# `pnpm install` — two oss builds in parallel then race each other
# (EISDIR renames; broke platform Amplify job 108 on 2026-07-16). The
# oss standalone CI does explicit installs, so nothing relies on the
# auto-install.
verifyDepsBeforeRun: false

allowBuilds:
  "@anthropic-ai/claude-agent-sdk": false
  sqlite3: false
  "@google/genai": false
  esbuild: false
  onnxruntime-node: false
  protobufjs: false
  sharp: false

# pnpm 11's supply-chain age gate (minimumReleaseAge, default 1440 min in
# fresh CI) blocks deps published <24h ago. @silverprotocol/* is FIRST-PARTY
# (we publish it, often consumed same-day — the 0.3.2 bump tripped this in
# the v0.1.2 release gate), so exclude the scope's packages UNVERSIONED:
# exact name@version pins would need editing on every silverprotocol
# release. Third-party deps keep the full age gate.
minimumReleaseAgeExclude:
  - "@silverprotocol/core"
  - "@silverprotocol/claude-agent-sdk"
  - "@silverprotocol/openai-agents"
  - "@silverprotocol/google-adk"
